name: livestock-health

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: livestock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: livestock_health
      MYSQL_USER: livestock
      MYSQL_PASSWORD: livestock123
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - livestock-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: livestock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - livestock-network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: livestock-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - livestock-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Spring Boot 后端
  backend:
    image: livestock-health-backend:2.0
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: livestock-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ELASTICSEARCH_HOST=elasticsearch
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - livestock-network
    restart: unless-stopped

  # Vue 3 前端
  frontend:
    image: livestock-health-frontend:2.0
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: livestock-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - livestock-network
    restart: unless-stopped

networks:
  livestock-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  elasticsearch_data:
